<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جميع الفعاليات | دليل الجامعة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Cairo',sans-serif;background:#f0f4f8;direction:rtl;}
        .navbar-custom{background:linear-gradient(135deg,#0f2b3d,#1b4a6e);}
        .filter-bar{background:white;border-radius:1.5rem;padding:1rem;box-shadow:0 5px 15px rgba(0,0,0,0.05);margin-bottom:2rem;}
        .event-card{transition:0.3s;border:none;border-radius:1rem;overflow:hidden;background:white;height:100%;box-shadow:0 5px 12px rgba(0,0,0,0.08);}
        .event-card:hover{transform:translateY(-5px);}
        .event-img{height:200px;object-fit:cover;width:100%;}
        .badge-cat{background:#eef2ff;color:#1e3c72;border-radius:40px;padding:0.3rem 1rem;font-size:0.75rem;}
        footer{background:#0f2b3d;color:#e2e8f0;margin-top:3rem;padding:1.5rem 0;text-align:center;}
        input[type="date"]{direction:ltr !important;text-align:center;}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-calendar-alt"></i> دليل الفعاليات</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link active" href="events.html">الفعاليات</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">عن الدليل</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">اتصل بنا</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1 class="text-center mb-4">📌 جميع الفعاليات</h1>
        <div class="filter-bar row g-3 align-items-end">
            <div class="col-md-4"><select id="catFilter" class="form-select"><option value="all">الكل</option><option value="ثقافية">ثقافية</option><option value="رياضية">رياضية</option><option value="علمية">علمية</option><option value="ترفيهية">ترفيهية</option></select></div>
            <div class="col-md-4"><input type="date" id="dateFilter" class="form-control"></div>
            <div class="col-md-4 d-flex gap-2"><button class="btn btn-primary w-50" onclick="filterEvents()">فلترة</button><button class="btn btn-secondary w-50" onclick="resetFilters()">إعادة تعيين</button></div>
        </div>
        <div class="row g-4" id="eventsContainer"></div>
        <div id="noResult" class="text-center p-5 text-muted d-none">❌ لا توجد فعاليات</div>
    </main>

<footer style="background: linear-gradient(135deg, #0f2b3d, #1b4a6e); color: #e2e8f0; margin-top: 3rem; padding: 2rem 0 1.5rem 0; text-align: center;">
    <div class="container">
        <div style="margin-bottom: 1.5rem;">
            <h5 style="font-weight: 700; margin-bottom: 1rem; color: #fff;">تابعنا على</h5>
            <div style="display: flex; justify-content: center; gap: 1.2rem; flex-wrap: wrap;">
                <a href="https://www.facebook.com/svuonline" target="_blank" style="background: #1877f2; color: white; width: 45px; height: 45px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.5rem; transition: 0.3s; text-decoration: none;">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://twitter.com/svuonline" target="_blank" style="background: #1da1f2; color: white; width: 45px; height: 45px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.5rem; transition: 0.3s; text-decoration: none;">
                    <i class="fab fa-twitter"></i>
                </a>
                <a href="https://www.instagram.com/svuonline" target="_blank" style="background: #e4405f; color: white; width: 45px; height: 45px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.5rem; transition: 0.3s; text-decoration: none;">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.linkedin.com/school/svuonline" target="_blank" style="background: #0077b5; color: white; width: 45px; height: 45px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.5rem; transition: 0.3s; text-decoration: none;">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://www.youtube.com/svuonline" target="_blank" style="background: #ff0000; color: white; width: 45px; height: 45px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.5rem; transition: 0.3s; text-decoration: none;">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </div>

        <div style="margin-bottom: 1rem;">
            <a href="https://www.svuonline.org" target="_blank" style="color: #e2e8f0; text-decoration: none; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-globe"></i> www.svuonline.org
            </a>
        </div>

        <div style="border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1rem; margin-top: 0.5rem; font-size: 0.85rem;">
            <p>&copy; 2026 دليل فعاليات الجامعة الافتراضية السورية | جميع الحقوق محفوظة</p>
            <p style="font-size: 0.75rem; opacity: 0.7;">مشروع BWP401 - جامعة SVU الافتراضية</p>
        </div>
    </div>
</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const data=[{id:1,title:"مهرجان الربيع",date:"2026-04-15",category:"ثقافية",location:"ساحة الجامعة",img:"https://images.unsplash.com/photo-1497032205916-ac775f0649ae?auto=format&fit=crop&w=800&q=80"},{id:2,title:"مباراة كرة قدم",date:"2026-04-18",category:"رياضية",location:"الملعب",img:"https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&q=80&w=400&h=250"},{id:3,title:"ورشة ذكاء اصطناعي",date:"2026-04-20",category:"علمية",location:"قاعة المؤتمرات",img:"https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80"},{id:4,title:"حفل موسيقي",date:"2026-04-25",category:"ترفيهية",location:"المسرح",img:"https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=800&q=80"}];
        
        function render(list){const c=document.getElementById('eventsContainer');const n=document.getElementById('noResult');if(!list.length){c.innerHTML='';n.classList.remove('d-none');return;}n.classList.add('d-none');c.innerHTML=list.map(e=>`<div class="col-md-6 col-lg-4"><div class="event-card"><img src="${e.img}" class="event-img"><div class="p-3"><span class="badge-cat">${e.category}</span><h5 class="mt-2">${e.title}</h5><p><i class="fas fa-calendar"></i> ${e.date}<br><i class="fas fa-map-marker-alt"></i> ${e.location}</p><a href="event-details.html?id=${e.id}" class="btn btn-sm btn-outline-primary rounded-pill">تفاصيل</a></div></div></div>`).join('');}
        function filterEvents(){let filtered=[...data];const cat=document.getElementById('catFilter').value;const date=document.getElementById('dateFilter').value;if(cat!=='all')filtered=filtered.filter(e=>e.category===cat);if(date)filtered=filtered.filter(e=>e.date===date);render(filtered);}
        function resetFilters(){document.getElementById('catFilter').value='all';document.getElementById('dateFilter').value='';render(data);}
        render(data);
    </script>
</body>
</html>
